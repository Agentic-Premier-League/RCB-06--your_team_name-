<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Career Copilot</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="forgot-page">
    <div class="forgot-card">

      <!-- ── STATE 1: Enter email ── -->
      <div id="email-state">
        <div class="forgot-icon">
          <i class="ph ph-lock-key-open"></i>
        </div>

        <h2 style="font-size:1.375rem;margin-bottom:0.375rem;">Forgot your password?</h2>
        <p style="color:var(--text-muted);font-size:0.9375rem;margin-bottom:1.75rem;line-height:1.6;">
          No worries — enter your email address and we'll send you a link to reset it.
        </p>

        <form onsubmit="sendReset(event)" style="text-align:left;">
          <div class="form-group">
            <label class="form-label" for="reset-email">Email address</label>
            <input
              type="email"
              id="reset-email"
              class="form-control"
              placeholder="you@university.edu"
              required
            >
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="sendBtn">
            <i class="ph ph-paper-plane-tilt"></i> Send Reset Link
          </button>
        </form>

        <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);">
          <a href="index.html" style="font-size:0.875rem;display:inline-flex;align-items:center;gap:0.375rem;color:var(--text-muted);">
            <i class="ph ph-arrow-left"></i> Back to Sign In
          </a>
        </div>
      </div>

      <!-- ── STATE 2: Email sent confirmation ── -->
      <div id="sent-state" class="hidden">
        <div class="success-icon">
          <i class="ph ph-envelope-open"></i>
        </div>

        <h2 style="font-size:1.375rem;margin-bottom:0.375rem;">Check your email</h2>
        <p style="color:var(--text-muted);font-size:0.9375rem;margin-bottom:0.75rem;line-height:1.6;">
          We've sent a password reset link to
        </p>
        <p id="sent-email-display" style="font-weight:700;color:var(--text);font-size:1rem;margin-bottom:1.5rem;"></p>

        <div style="background:var(--bg);border-radius:var(--r-md);padding:1rem;margin-bottom:1.5rem;text-align:left;">
          <p style="font-size:0.8125rem;color:var(--text-muted);margin:0;line-height:1.6;">
            <i class="ph ph-clock" style="color:var(--primary);"></i>
            &nbsp;The link expires in <strong>15 minutes</strong>. Check your spam folder if you don't see it.
          </p>
        </div>

        <button class="btn btn-primary btn-full" onclick="resendLink()">
          <i class="ph ph-arrows-clockwise"></i> Resend Link
        </button>

        <div style="margin-top:1.25rem;">
          <a href="index.html" style="font-size:0.875rem;display:inline-flex;align-items:center;gap:0.375rem;color:var(--text-muted);">
            <i class="ph ph-arrow-left"></i> Back to Sign In
          </a>
        </div>
      </div>

    </div>
  </div>

  <!-- Branding footer -->
  <div style="position:fixed;top:1.25rem;left:50%;transform:translateX(-50%);">
    <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;font-size:1.125rem;font-weight:800;color:var(--primary);text-decoration:none;">
      <i class="ph-fill ph-compass-tool"></i> Career Copilot
    </a>
  </div>

  <script>
    function sendReset(e) {
      e.preventDefault();
      const email = document.getElementById('reset-email').value.trim();
      if (!email) return;

      const btn = document.getElementById('sendBtn');
      btn.innerHTML = '<i class="ph ph-circle-notch"></i> Sending…';
      btn.disabled = true;

      setTimeout(() => {
        document.getElementById('sent-email-display').textContent = email;
        document.getElementById('email-state').classList.add('hidden');
        document.getElementById('sent-state').classList.remove('hidden');
      }, 1200);
    }

    function resendLink() {
      const btn = event.target.closest('button');
      btn.innerHTML = '<i class="ph ph-check"></i> Sent!';
      btn.disabled = true;
      setTimeout(() => {
        btn.innerHTML = '<i class="ph ph-arrows-clockwise"></i> Resend Link';
        btn.disabled = false;
      }, 3000);
    }
  </script>

</body>
</html>
